<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeMarket - רוחב מסך מלא</title>
    <style>
        /* איפוס מלא של כל הרווחים */
        * {
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box !important;
        }
        
        html, body {
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            direction: rtl;
        }
        
        .fullscreen-container {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            overflow: hidden !important;
        }
        
        .fullscreen-iframe {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            outline: none !important;
            display: block !important;
        }
    </style>
</head>
<body>
    <div class="fullscreen-container">
        <iframe 
            src="https://extraordinary-cobbler-480644.netlify.app/"
            class="fullscreen-iframe"
            title="HomeMarket - מנוע חיפוש נכסים"
            allowfullscreen
            scrolling="yes">
        </iframe>
    </div>

    <script>
        // וידוא שה-iframe תופס את כל המסך
        function resizeIframe() {
            const iframe = document.querySelector('.fullscreen-iframe');
            const container = document.querySelector('.fullscreen-container');
            
            if (iframe && container) {
                iframe.style.width = window.innerWidth + 'px';
                iframe.style.height = window.innerHeight + 'px';
                container.style.width = window.innerWidth + 'px';
                container.style.height = window.innerHeight + 'px';
            }
        }
        
        // הפעלה בטעינה ובשינוי גודל חלון
        window.addEventListener('load', resizeIframe);
        window.addEventListener('resize', resizeIframe);
        
        // הפעלה מיידית
        resizeIframe();
    </script>
</body>
</html>
